<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Intelligence Dashboard 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.9);
            --primary-grad: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --secondary-grad: linear-gradient(135deg, #3b82f6 0%, #2dd4bf 100%);
            --dark-navy: #0f172a;
            --text-main: #1e293b;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: #f1f5f9; 
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%);
            margin: 0; display: flex; height: 100vh; overflow: hidden; color: var(--text-main);
        }

        .sidebar {
            width: 280px; background: var(--dark-navy); color: white;
            display: flex; flex-direction: column; padding: 25px; box-shadow: 4px 0 20px rgba(0,0,0,0.1);
        }

        .sidebar h2 { font-size: 18px; font-weight: 800; margin-bottom: 30px; background: var(--secondary-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .sidebar label { font-size: 10px; font-weight: 700; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; display: block; }

        .sidebar select, .sidebar input[type="file"] {
            width: 100%; background: #1e293b; color: white; border: 1px solid #334155;
            padding: 10px; margin-bottom: 20px; border-radius: 8px;
        }

        .data-list { flex: 1; overflow-y: auto; margin-top: 10px; border-top: 1px solid #334155; padding-top: 15px; }
        .data-item { display: flex; justify-content: space-between; align-items: center; background: #1e293b; padding: 8px; border-radius: 6px; margin-bottom: 8px; font-size: 11px; }
        .btn-delete { background: none; border: none; color: #f43f5e; cursor: pointer; font-size: 16px; }

        .main-content { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        .top-nav { padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }

        .card { background: var(--glass-bg); border: 1px solid rgba(255,255,255,0.4); padding: 18px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .card h3 { margin: 0 0 15px 0; font-size: 13px; text-transform: uppercase; color: #64748b; letter-spacing: 0.5px; }

        .dashboard-grid { padding: 20px 30px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; }
        .kpi-card { text-align: center; border-left: 4px solid #6366f1; }
        .kpi-card p { font-size: 24px; font-weight: 800; margin: 5px 0 0 0; color: var(--dark-navy); }

        .chart-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; padding: 0 30px 20px 30px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 30px 20px 30px; }
        .table-row { padding: 0 30px 30px 30px; }

        .table-container { border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; background: white; max-height: 300px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        table th { background: #f8fafc; padding: 12px; text-align: left; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #e2e8f0; }
        table td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        table tr:hover { background: #f1f5f9; }
        .high-prod { color: #059669; font-weight: 700; background: #ecfdf5; padding: 2px 6px; border-radius: 4px; }
        .low-prod { color: #dc2626; font-weight: 700; background: #fef2f2; padding: 2px 6px; border-radius: 4px; }
        .selected-row { background: #eef2ff !important; border-left: 4px solid #6366f1; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>CORE ANALYTICS</h2>
        <label>Active Periods</label>
        <select id="periodSelector" onchange="switchPeriod()"><option value="" disabled selected>Loading GitHub...</option></select>
        <label>Import New Data</label>
        <input type="file" id="upload" accept=".xlsx, .xls" />
        <label>Data List</label>
        <div class="data-list" id="dataList"></div>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <h1 style="font-size: 20px; font-weight: 800;">Operational Performance <span id="currentPeriodLabel" style="color: #6366f1;"></span></h1>
            <div id="statusBadge" style="background: #dcfce7; color: #166534; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700;">LIVE SYSTEM</div>
        </div>

        <div class="dashboard-grid">
            <div class="card kpi-card"><h3>Total Calls</h3><p id="totalCalls">0</p></div>
            <div class="card kpi-card"><h3>Success</h3><p id="successCalls">0</p></div>
            <div class="card kpi-card"><h3>Conn. Rate</h3><p id="connRate">0%</p></div>
            <div class="card kpi-card"><h3>Avg Prod</h3><p id="avgProd">0</p></div>
            <div class="card kpi-card"><h3>Agents</h3><p id="totalActiveSummary">0</p></div>
        </div>

        <div class="chart-row">
            <div class="card">
                <h3>Global Daily Trend</h3>
                <div style="height: 250px;"><canvas id="trendChart"></canvas></div>
            </div>
            <div class="card">
                <h3>Market Share (Prod)</h3>
                <div style="height: 250px;"><canvas id="pieChart"></canvas></div>
            </div>
        </div>

        <div class="grid-2">
            <div class="card">
                <h3 style="color: #059669;">Top 5 Performers</h3>
                <div style="height: 200px;"><canvas id="topChart"></canvas></div>
            </div>
            <div class="card">
                <h3 style="color: #dc2626;">Needs Attention</h3>
                <div style="height: 200px;"><canvas id="bottomChart"></canvas></div>
            </div>
        </div>

        <div class="table-row">
            <div class="card">
                <h3>Detailed Analytics Breakdown</h3>
                <div class="table-container">
                    <table>
                        <thead><tr><th>AGENT NAME</th><th>SUCCESS</th><th>UNSUCCESS</th><th>ACTIVE DAYS</th><th>PROD</th></tr></thead>
                        <tbody id="agentTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

<script>
let storage = {};
let trendChart, topChart, bottomChart, pieChart;

// 1. KONFIGURASI GITHUB
const GITHUB_USER = 'AlvyFahmy'; 
const REPO_NAME = 'Agent_Retention'; 
const BRANCH = 'main';
const filesToLoad = ['Januari-2026.xlsx', 'Februari-2026.xlsx', 'Maret-2026.xlsx'];

// 2. AUTO-LOAD DARI GITHUB
window.addEventListener('DOMContentLoaded', async () => {
    const statusBadge = document.getElementById('statusBadge');
    statusBadge.innerText = "SYNCING WITH GITHUB...";
    statusBadge.style.background = "#fef9c3";

    for (const fileName of filesToLoad) {
        // PERBAIKAN: Menggunakan variabel yang benar di URL
        const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/${BRANCH}/${fileName}`;
        
        try {
            const response = await fetch(url);
            if (!response.ok) continue;
            const arrayBuffer = await response.arrayBuffer();
            const data = new Uint8Array(arrayBuffer);
            const wb = XLSX.read(data, { type: 'array' });
            const periodName = fileName.replace('.xlsx', '');

            storage[periodName] = {
                agentData: XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]),
                dailyTrend: XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[1]]),
                summary: XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[2]])
            };
            updatePeriodDropdown(periodName);
        } catch (e) { console.error("Error loading " + fileName, e); }
    }

    if (Object.keys(storage).length > 0) {
        const lastPeriod = Object.keys(storage).pop();
        displayData(lastPeriod);
        statusBadge.innerText = "GITHUB CONNECTED";
        statusBadge.style.background = "#dcfce7";
        updateDataList();
    }
});

// 3. FUNGSI DASHBOARD
document.getElementById('upload').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        const periodName = file.name.replace(/\.[^/.]+$/, "");
        storage[periodName] = {
            agentData: XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]),
            dailyTrend: XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[1]]),
            summary: XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[2]])
        };
        updatePeriodDropdown(periodName);
        updateDataList();
        displayData(periodName);
    };
    reader.readAsArrayBuffer(file);
});

function updatePeriodDropdown(selected) {
    const select = document.getElementById('periodSelector');
    if (select.options[0]?.disabled) select.remove(0);
    if (![...select.options].some(o => o.value === selected)) select.add(new Option(selected, selected));
    select.value = selected;
}

function updateDataList() {
    const list = document.getElementById('dataList');
    list.innerHTML = '';
    Object.keys(storage).forEach(key => {
        list.innerHTML += `<div class="data-item"><span>${key}</span><button class="btn-delete" onclick="deleteData('${key}')">×</button></div>`;
    });
}

function deleteData(key) {
    if(confirm('Hapus data ' + key + '?')) {
        delete storage[key];
        location.reload();
    }
}

function switchPeriod() {
    const period = document.getElementById('periodSelector').value;
    if (period) displayData(period);
}

function displayData(period) {
    document.getElementById('currentPeriodLabel').innerText = "— " + period;
    const data = storage[period];
    updateDashboard(data.agentData, data.dailyTrend);
}

function updateDashboard(agents, dailyTrend) {
    const filtered = agents.filter(r => r['CREATOR'] && String(r['CREATOR']).trim() !== 'Grand Total');
    const grandTotalRow = agents.find(r => String(r['CREATOR']).trim() === 'Grand Total');

    let tSuccess = 0, tUnsuccess = 0;
    filtered.forEach(r => {
        tSuccess += (Number(r['Success Call']) || 0);
        tUnsuccess += (Number(r['Unsuccess Call']) || 0);
    });

    const total = tSuccess + tUnsuccess;
    document.getElementById('totalCalls').innerText = total.toLocaleString();
    document.getElementById('successCalls').innerText = tSuccess.toLocaleString();
    document.getElementById('connRate').innerText = (tSuccess / total * 100 || 0).toFixed(1) + '%';
    document.getElementById('avgProd').innerText = (Number(grandTotalRow?.['Prod']) || 0).toFixed(2);
    document.getElementById('totalActiveSummary').innerText = filtered.length;

    const tableBody = document.getElementById('agentTableBody');
    tableBody.innerHTML = '';
    filtered.forEach(r => {
        const prod = Number(r['Prod']) || 0;
        tableBody.innerHTML += `<tr>
            <td><b>${r['CREATOR']}</b></td>
            <td>${r['Success Call'] || 0}</td><td>${r['Unsuccess Call'] || 0}</td>
            <td>${r['Total Active'] || 0}</td>
            <td><span class="${prod >= 3 ? 'high-prod' : prod <= 1.5 ? 'low-prod' : ''}">${prod.toFixed(2)}</span></td>
        </tr>`;
    });

    renderCharts(filtered, dailyTrend);
}

function renderCharts(agents, dailyTrend) {
    const trendGT = dailyTrend.find(r => r['CREATOR'] === 'Grand Total');
    if (trendGT) {
        const labels = Object.keys(trendGT).filter(k => k !== 'CREATOR' && k !== 'Grand Total');
        const values = labels.map(l => trendGT[l] || 0);
        if (trendChart) trendChart.destroy();
        trendChart = new Chart(document.getElementById('trendChart'), {
            type: 'line',
            data: { labels, datasets: [{ label: 'Calls', data: values, borderColor: '#6366f1', backgroundColor: 'rgba(99, 102, 241, 0.1)', fill: true, tension: 0.4 }] },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    const top5 = [...agents].sort((a,b) => (b['Prod']||0)-(a['Prod']||0)).slice(0, 5);
    const bot5 = [...agents].sort((a,b) => (a['Prod']||0)-(b['Prod']||0)).slice(0, 5);

    if (topChart) topChart.destroy();
    topChart = new Chart(document.getElementById('topChart'), {
        type: 'bar',
        data: { labels: top5.map(d=>d['CREATOR']), datasets: [{ data: top5.map(d=>d['Prod']), backgroundColor: '#107c10' }] },
        options: { indexAxis: 'y', maintainAspectRatio: false }
    });

    if (bottomChart) bottomChart.destroy();
    bottomChart = new Chart(document.getElementById('bottomChart'), {
        type: 'bar',
        data: { labels: bot5.map(d=>d['CREATOR']), datasets: [{ data: bot5.map(d=>d['Prod']), backgroundColor: '#dc2626' }] },
        options: { indexAxis: 'y', maintainAspectRatio: false }
    });

    const high = agents.filter(a => a['Prod'] >= 3).length;
    const mid = agents.filter(a => a['Prod'] < 3 && a['Prod'] > 1.5).length;
    const low = agents.filter(a => a['Prod'] <= 1.5).length;
    if (pieChart) pieChart.destroy();
    pieChart = new Chart(document.getElementById('pieChart'), {
        type: 'doughnut',
        data: { labels: ['High', 'Mid', 'Low'], datasets: [{ data: [high, mid, low], backgroundColor: ['#107c10', '#fbbf24', '#dc2626'] }] },
        options: { maintainAspectRatio: false }
    });
}
</script>
</body>
</html>
